name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: familycare
          POSTGRES_PASSWORD: familycare_dev
          POSTGRES_DB: familycare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U familycare"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=familycare_test;Username=familycare;Password=familycare_dev"
          Jwt__Issuer: "FamilyCare.Tests"
          Jwt__Audience: "FamilyCare.Tests"
          Jwt__Key: "CI_TEST_KEY_NOT_FOR_PRODUCTION_USE_AT_LEAST_32_CHARS_LONG"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/FamilyCare.Api/Dockerfile
          push: false
          tags: familycare-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
